# Cloudflare Pages Configuration
name = "tgcf-dl"
compatibility_date = "2025-03-01"

# Pages will serve the built output from `dist/`
# Deploy with: wrangler pages deploy dist --project-name tgcf-dl

[site]
bucket = "./dist"

# Bind to the TG-WS-API Worker's Durable Object for WebSocket proxying
# This allows /api/ routes to use Durable Objects for WS proxy
[[services]]
binding = "WS_API"
service = "tg-ws-api"

[durable_objects]
bindings = [
  { name = "WS_PROXY", class_name = "WebSocketProxy", service = "tg-ws-api" }
]
